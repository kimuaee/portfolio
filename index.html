<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시각디자인 포트폴리오</title>
    <meta name="description" content="시각디자인 작업물 포트폴리오." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#works">작업물로 바로가기</a>

    <header class="topbar" aria-label="상단 내비게이션">
      <div class="topbar__inner">
        <a class="brand" href="#top" aria-label="홈으로">
          <img class="brand__img" src="./Untitled-1(3).png" alt="Portfolio" />
        </a>
        <nav class="nav">
          <a class="nav__link" href="#works">WORKS</a>
          <a class="nav__link" href="#contact">CONTACT</a>
        </nav>
      </div>
    </header>

    <main id="top" class="main">
      <div class="cover-black-bar" aria-hidden="true"></div>
      <section class="cover cover--image" aria-label="표지">
        <div class="cover__image-wrap">
          <img class="cover__image" src="./Untitled-1(1).png" alt="포트폴리오 표지" decoding="async" loading="eager" />
        </div>
      </section>

      <section id="works-ux" class="works" aria-label="User Experience Design I">
        <h2 class="works__title">USER EXPERIENCE DESIGN I</h2>
        <div class="grid grid--one-col" id="worksGridUx" aria-live="polite"></div>
      </section>

      <section id="works" class="works" aria-label="작업물">
        <h2 class="works__title">WORKS</h2>
        <div class="grid" id="worksGrid" aria-live="polite"></div>
      </section>

      <footer id="contact" class="footer" aria-label="연락처">
        <div class="footer__inner">
          <div class="footer__left">
            <h2 class="section-title">CONTACT</h2>
          </div>
          <div class="footer__right">
            <a class="contact-link" href="mailto:yeseoo@sookmyung.ac.kr">yeseoo@sookmyung.ac.kr</a>
            <a class="contact-link" href="https://www.instagram.com/gimuaee/" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a class="contact-link" href="#" id="behanceLink">Behance</a>
          </div>
        </div>
        <div class="footer__bottom">
          <span>© Portfolio</span>
        </div>
      </footer>
    </main>

    <script src="./works.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
